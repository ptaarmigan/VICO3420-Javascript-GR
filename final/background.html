<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"

      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Gothic:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <button
      type="button"
      class="btn btn-primary"
      id="prevBtn"
      onclick="reverseSlide()"
    >
      Prev
    </button>
    <button
      type="button"
      class="btn btn-primary"
      id="nextBtn"
      onclick="advanceSlide()"
    >
      Next
    </button>

    <main class="container-fluid">
      <div class="container-fluid">
        <div id="slideshow" class="container-fluid"></div>
      </div>
    </main>
    <div class="container-fluid text-light bg-dark mt-2 mb-0 pt-5 pb-1">
      <div class="container">
        <footer
          class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"
        >
          <p class="col-md-4 mb-0 text-body-secondary">
            Made by Graham Richardson <br />
            For VICO 3420 at Ohio University
          </p>
          <ul class="nav col-md-4 justify-content-end">
            <li class="nav-item">
              <a
                href="index.html"
                class="nav-link px-2 text-body-secondary"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link px-2 text-body-secondary disabled">Part 1</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link px-2 text-body-secondary">Part 2</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link px-2 text-body-secondary">Part 3</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link px-2 text-body-secondary">About</a>
            </li>
          </ul>
        </footer>
      </div>
    </div>

    <script>
      let slideContent = [
        [
          "1",
          "media/invert.png",
          "Layout 1",
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nam et purus auctor, aliquet dolor vel, accumsan est. Mauris elementum porttitor dictum. Orci varius natoque penatibus et magnis dis parturient montes, nascetur ridiculus mus. Vestibulum congue dui a est tristique molestie. Ut molestie urna purus. Praesent condimentum lectus eu leo rutrum volutpat. Praesent laoreet pulvinar est, et mattis mauris fringilla sit amet. Donec a efficitur arcu. Mauris pretium odio sed consequat consectetur. ",
        ],
        [
          "2",
          "media/invert.png",
          "Layout 2",
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nam et purus auctor, aliquet dolor vel, accumsan est. Mauris elementum porttitor dictum. Orci varius natoque penatibus et magnis dis parturient montes, nascetur ridiculus mus. Vestibulum congue dui a est tristique molestie. Ut molestie urna purus. Praesent condimentum lectus eu leo rutrum volutpat. Praesent laoreet pulvinar est, et mattis mauris fringilla sit amet. Donec a efficitur arcu. Mauris pretium odio sed consequat consectetur. ",
        ],
        [
          "3",
          "media/invert.png",
          "Layout 3",
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nam et purus auctor, aliquet dolor vel, accumsan est. Mauris elementum porttitor dictum. Orci varius natoque penatibus et magnis dis parturient montes, nascetur ridiculus mus. Vestibulum congue dui a est tristique molestie. Ut molestie urna purus. Praesent condimentum lectus eu leo rutrum volutpat. Praesent laoreet pulvinar est, et mattis mauris fringilla sit amet. Donec a efficitur arcu. Mauris pretium odio sed consequat consectetur. ",
        ],
      ];

      let currentSlide = 0;
      console.log("start: currentSlide = " + currentSlide);

      let storyCount = 0;

      let layoutNumber = 1;

      function updateLayout() {
        layoutNumber = Number(slideContent[currentSlide][0]);
      }

      console.log("layoutNumber = " + layoutNumber);

      function updateSlide() {
        updateLayout();
        switch (layoutNumber) {
          case 1:
            document.getElementById("slideshow").innerHTML =
              `<div class="d-flex">
            <div class="col-md-9">
              <img class="img-fluid" src="${slideContent[currentSlide][1]}" />
            </div>
            <div class="col-md-3 bg-light py-5 px-4">
              <h2 class="h2">${slideContent[currentSlide][2]}</h2>
              <p>
                ${slideContent[currentSlide][3]}
              </p>
            </div>
          </div>`;
            break;

          case 2:
            document.getElementById("slideshow").innerHTML =
              `<div class="container-fluid">
            <div class="overflow-hidden vh-100 col-12">
              <div class="col-12 bg-light py-4 px-4 pt-5 text-end">
                <h2 class="h2">${slideContent[currentSlide][2]}</h2>
               <p>
               ${slideContent[currentSlide][3]}
                </p>
              </div>
              <img class="img-fluid" src="${slideContent[currentSlide][1]}" />
            </div>
          </div>`;
            break;

          case 3:
            document.getElementById("slideshow").innerHTML =
              `<div class="d-flex">
            <div class="col-md-3 bg-light py-5 px-4">
              <h2 class="h2">${slideContent[currentSlide][2]}</h2>
              <p>${slideContent[currentSlide][3]}</p>
            </div>
            <div class="col-md-9">
              <img class="img-fluid" src="${slideContent[currentSlide][1]}" />
            </div>
          </div>`;
            break;
        }
        console.log("slide layout = " + layoutNumber);
      }

      function reverseSlide() {
        if (currentSlide > 0) {
          currentSlide -= 1;
          document.getElementById("slideshow").innerHTML = ``;
          updateSlide();
        }
      }

      function advanceSlide() {
        if (currentSlide < 2) {
          currentSlide += 1;
          updateSlide();
        }
      }

      window.onload = updateSlide();
    </script>
  </body>
</html>
