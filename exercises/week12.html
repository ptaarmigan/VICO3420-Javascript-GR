    <div id="map"></div>
    <script>
      let latitude;
      let longitude;

      function createMap() {
        mapboxgl.accessToken =
          "pk.eyJ1IjoiZ3JpY2hhcmRzb241NTEiLCJhIjoiY21ucXJ1NDhyMGFtNjJvcHB0am51bGQ0ZyJ9.aIdvwhOggJB010iauLWOCw";
        const map = new mapboxgl.Map({
          container: "map",
          // Choose from Mapbox's core styles, or make your own style with Mapbox Studio
          style: "mapbox://styles/mapbox/standard",
          center: [latitude, longitude],
          zoom: 8,
        });

        // Create a default Marker and add it to the map.
        const marker1 = new mapboxgl.Marker()
          .setLngLat([latitude, longitude])
          .addTo(map);
      }

      let endpoint = "https://api.wheretheiss.at/v1/satellites/25544";

      let request = new XMLHttpRequest();

      request.open("GET", endpoint);

      request.onload = function () {
        let response = request.response;

        let parsedData = JSON.parse(response);

        // View in Console (optional)
        console.log(parsedData);

        // Add code below this line to work with the parsedData object
        latitude = parsedData.latitude;
        longitude = parsedData.longitude;

        createMap();
      };

      try {
        request.send();
      } catch (err) {
        console.log("Error: " + err.message);
      }
    </script>
